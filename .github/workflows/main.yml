name: Rodar Robô Licitabahia Diário
on:
  schedule:
    - cron: '0 11 * * *' # Roda todo dia às 08h (Horário de Brasília)
  workflow_dispatch: # Botão para rodar manualmente

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Instalar Dependências
        run: |
          pip install -r requirements.txt
          # LINHA MÁGICA: Baixa o navegador que o seu scraper precisa
          python -m playwright install chromium --with-deps

      - name: Executar Robô
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_SENHA_APP: ${{ secrets.EMAIL_SENHA_APP }}
        run: python main.py
