name: Rodar Robô Licitabahia Diário
on:
  schedule:
    # Roda todo dia às 08h da manhã (Horário de Brasília)
    # 11:00 UTC = 08:00 GMT-3
    - cron: '0 11 * * *'
  workflow_dispatch: # Botão para você rodar manualmente quando quiser

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Instalar Dependências
        run: |
          pip install -r requirements.txt
          # Se o seu scraper usa Playwright, precisa disso:
          # playwright install chromium

      - name: Executar Robô
        env:
          # Estas chaves você vai cadastrar nos Secrets do GitHub
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_SENHA_APP: ${{ secrets.EMAIL_SENHA_APP }}
        run: python main.py